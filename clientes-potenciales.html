<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro de Clientes Potenciales</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --accent: #8b5cf6;
        --danger: #ef4444;
        --shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        --radius: 16px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 20% 0%, rgba(139, 92, 246, 0.25), transparent 60%),
          radial-gradient(900px 600px at 90% 20%, rgba(34, 197, 94, 0.18), transparent 55%),
          var(--bg);
        min-height: 100vh;
      }
      .page { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; overflow-x: hidden; }
      header { margin: 10px 0 18px; }
      h1 { font-size: clamp(22px, 2.6vw, 28px); letter-spacing: -0.02em; margin: 0; }
      .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.4; }
      .panel {
        background: linear-gradient(180deg, var(--panel), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 24px;
      }
      .field { margin-bottom: 18px; }
      .field:last-of-type { margin-bottom: 22px; }
      label { display: block; font-size: 13px; color: rgba(255,255,255,0.86); margin-bottom: 6px; }
      input {
        width: 100%;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 12px;
        color: var(--text);
        padding: 12px 14px;
        outline: none;
        font-size: 16px;
      }
      input:focus {
        border-color: rgba(139, 92, 246, 0.8);
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18);
      }
      .error { font-size: 12px; color: var(--danger); margin-top: 4px; }
      button[type="submit"] {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }
      button[type="submit"]:hover { opacity: 0.95; }
      button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
      .status { margin-top: 14px; font-size: 14px; }
      .status.success { color: #22c55e; }
      .status.error { color: var(--danger); }
      a.back {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
      }
      a.back:hover { color: var(--text); }
      .nav-bar {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        background: rgba(0,0,0,0.25);
        border-bottom: 1px solid var(--border);
        max-width: 1100px;
        margin: 0 auto;
        position: relative;
      }
      .menu-trigger {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        outline: none;
      }
      .menu-trigger:hover { background: rgba(255,255,255,0.12); }
      .menu-trigger svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .menu-dropdown {
        display: none;
        position: absolute;
        top: 100%;
        left: 16px;
        margin-top: 4px;
        min-width: 200px;
        background: #0f1729;
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        padding: 6px;
        z-index: 100;
      }
      .menu-dropdown.open { display: block; }
      @media (max-width: 640px) {
        .page { padding: 20px 12px 40px; }
        .panel { padding: 18px; }
      }
      .menu-dropdown a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        border-radius: 8px;
        transition: background 0.15s, color 0.15s;
      }
      .menu-dropdown a:hover { background: rgba(255,255,255,0.08); color: var(--text); }
      .menu-dropdown a.active { color: var(--accent); }
      .menu-dropdown a .tab-icon { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .menu-dropdown .menu-divider { height: 1px; background: var(--border); margin: 6px 0; }
    </style>
  </head>
  <body>
    <nav class="nav-bar" role="navigation">
      <div class="menu-wrap">
        <button type="button" class="menu-trigger" id="menuTrigger" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          Menú
        </button>
        <div class="menu-dropdown" id="menuDropdown">
          <a href="index.html">Formulario Pensión</a>
          <a href="clientes.html">Registro de Afiliados</a>
          <a href="revisar-clientes.html">Listado de Clientes</a>
          <a href="clientes-potenciales.html" class="active">Clientes Potenciales</a>
          <a href="recordatorios.html">Recordatorios</a>
          <div class="menu-divider"></div>
          <a href="#" id="btnCerrarSesion" title="Cerrar sesión"><svg class="tab-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="10" height="16" rx="1"/><path d="M10 12h10M17 9l3 3-3 3"/></svg> Cerrar sesión</a>
        </div>
      </div>
    </nav>
    <script>
      (function() {
        var trigger = document.getElementById("menuTrigger");
        var dropdown = document.getElementById("menuDropdown");
        if (trigger && dropdown) {
          trigger.addEventListener("click", function(e) { e.stopPropagation(); dropdown.classList.toggle("open"); trigger.setAttribute("aria-expanded", dropdown.classList.contains("open")); });
          document.addEventListener("click", function() { dropdown.classList.remove("open"); if (trigger) trigger.setAttribute("aria-expanded", "false"); });
        }
        var btn = document.getElementById("btnCerrarSesion");
        if (btn) {
          var url = window.SUPABASE_URL, key = window.SUPABASE_ANON_KEY;
          if (url && key && url.indexOf("TU_PROYECTO") === -1) {
            btn.addEventListener("click", function(e) { e.preventDefault(); window.supabase.createClient(url, key).auth.signOut().then(function() { window.location.href = "login.html"; }); });
          }
        }
      })();
    </script>
    <div class="page">
      <a href="revisar-clientes.html" class="back">← Volver al listado</a>
      <header>
        <h1>Clientes Potenciales</h1>
        <p class="subtitle">Registra nombre y teléfono del cliente potencial.</p>
      </header>
      <div class="panel">
        <form id="formPotencial">
          <div class="field">
            <label for="nombre">Nombre <span style="color:var(--muted);font-size:12px;">*</span></label>
            <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo" autocomplete="name" />
            <div class="error" id="errorNombre"></div>
          </div>
          <div class="field">
            <label for="telefono">Teléfono <span style="color:var(--muted);font-size:12px;">*</span></label>
            <input type="tel" id="telefono" name="telefono" required placeholder="Ej. 9 1234 5678" autocomplete="tel" />
            <div class="error" id="errorTelefono"></div>
          </div>
          <div class="field">
            <label for="ciudad">Ciudad <span style="color:var(--muted);font-size:12px;">(opcional)</span></label>
            <input type="text" id="ciudad" name="ciudad" placeholder="Ej. Santiago" autocomplete="address-level2" />
          </div>
          <button type="submit" id="btnEnviar">Enviar</button>
          <div class="status" id="status"></div>
        </form>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var url = window.SUPABASE_URL;
        var key = window.SUPABASE_ANON_KEY;
        if (!url || !key || url.indexOf("TU_PROYECTO") !== -1) {
          window.location.replace("login.html");
          return;
        }
        var supabase = window.supabase.createClient(url, key);

        supabase.auth.getSession().then(function (r) {
          if (!r.data.session) {
            window.location.replace("login.html");
            return;
          }

          var userId = r.data.session.user.id;

          var form = document.getElementById("formPotencial");
          var statusEl = document.getElementById("status");
          var btnEnviar = document.getElementById("btnEnviar");
          var errorNombre = document.getElementById("errorNombre");
          var errorTelefono = document.getElementById("errorTelefono");

          function setStatus(msg, isError) {
            statusEl.textContent = msg || "";
            statusEl.className = "status" + (isError ? " error" : msg ? " success" : "");
          }
          function clearErrors() {
            errorNombre.textContent = "";
            errorTelefono.textContent = "";
          }

          form.addEventListener("submit", function (e) {
          e.preventDefault();
          var nombre = (document.getElementById("nombre").value || "").trim();
          var telefono = (document.getElementById("telefono").value || "").trim();
          var ciudad = (document.getElementById("ciudad").value || "").trim() || null;
          clearErrors();
          setStatus("");

          if (!nombre) {
            errorNombre.textContent = "Ingresa tu nombre.";
            return;
          }
          if (!telefono) {
            errorTelefono.textContent = "Ingresa tu teléfono.";
            return;
          }

          btnEnviar.disabled = true;
          setStatus("Guardando…");

          supabase.from("clientes_potenciales").insert({ user_id: userId, nombre: nombre, telefono: telefono, ciudad: ciudad })
            .then(function (result) {
              btnEnviar.disabled = false;
              if (result.error) {
                setStatus(result.error.message || "Error al guardar.", true);
                return;
              }
              setStatus("Cliente potencial registrado correctamente.");
              form.reset();
            })
            .catch(function (err) {
              btnEnviar.disabled = false;
              setStatus(err.message || "Error de conexión.", true);
            });
          });
        });
      })();
    </script>
  </body>
</html>
