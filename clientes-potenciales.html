<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro de Clientes Potenciales</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --accent: #8b5cf6;
        --danger: #ef4444;
        --shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        --radius: 16px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 20% 0%, rgba(139, 92, 246, 0.25), transparent 60%),
          radial-gradient(900px 600px at 90% 20%, rgba(34, 197, 94, 0.18), transparent 55%),
          var(--bg);
        min-height: 100vh;
      }
      .page { max-width: 480px; margin: 0 auto; padding: 28px 16px 60px; }
      header { margin: 10px 0 18px; }
      h1 { font-size: clamp(22px, 2.6vw, 28px); letter-spacing: -0.02em; margin: 0; }
      .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.4; }
      .panel {
        background: linear-gradient(180deg, var(--panel), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 24px;
      }
      .field { margin-bottom: 18px; }
      .field:last-of-type { margin-bottom: 22px; }
      label { display: block; font-size: 13px; color: rgba(255,255,255,0.86); margin-bottom: 6px; }
      input {
        width: 100%;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 12px;
        color: var(--text);
        padding: 12px 14px;
        outline: none;
        font-size: 16px;
      }
      input:focus {
        border-color: rgba(139, 92, 246, 0.8);
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18);
      }
      .error { font-size: 12px; color: var(--danger); margin-top: 4px; }
      button[type="submit"] {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }
      button[type="submit"]:hover { opacity: 0.95; }
      button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
      .status { margin-top: 14px; font-size: 14px; }
      .status.success { color: #22c55e; }
      .status.error { color: var(--danger); }
      a.back {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
      }
      a.back:hover { color: var(--text); }
      .nav-bar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 12px 16px;
        background: rgba(0,0,0,0.25);
        border-bottom: 1px solid var(--border);
        max-width: 480px;
        margin: 0 auto;
      }
      .nav-bar a {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
      }
      .nav-bar a:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    </style>
  </head>
  <body>
    <nav class="nav-bar" role="navigation">
      <a href="login.html" title="Iniciar sesión">Iniciar sesión</a>
    </nav>
    <div class="page">
      <a href="index.html" class="back">← Volver al inicio</a>
      <header>
        <h1>Clientes Potenciales</h1>
        <p class="subtitle">Deja tu nombre y teléfono y te contactaremos.</p>
      </header>
      <div class="panel">
        <form id="formPotencial">
          <div class="field">
            <label for="nombre">Nombre <span style="color:var(--muted);font-size:12px;">*</span></label>
            <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo" autocomplete="name" />
            <div class="error" id="errorNombre"></div>
          </div>
          <div class="field">
            <label for="telefono">Teléfono <span style="color:var(--muted);font-size:12px;">*</span></label>
            <input type="tel" id="telefono" name="telefono" required placeholder="Ej. 9 1234 5678" autocomplete="tel" />
            <div class="error" id="errorTelefono"></div>
          </div>
          <button type="submit" id="btnEnviar">Enviar</button>
          <div class="status" id="status"></div>
        </form>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var form = document.getElementById("formPotencial");
        var statusEl = document.getElementById("status");
        var btnEnviar = document.getElementById("btnEnviar");
        var errorNombre = document.getElementById("errorNombre");
        var errorTelefono = document.getElementById("errorTelefono");

        function setStatus(msg, isError) {
          statusEl.textContent = msg || "";
          statusEl.className = "status" + (isError ? " error" : msg ? " success" : "");
        }
        function clearErrors() {
          errorNombre.textContent = "";
          errorTelefono.textContent = "";
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var nombre = (document.getElementById("nombre").value || "").trim();
          var telefono = (document.getElementById("telefono").value || "").trim();
          clearErrors();
          setStatus("");

          if (!nombre) {
            errorNombre.textContent = "Ingresa tu nombre.";
            return;
          }
          if (!telefono) {
            errorTelefono.textContent = "Ingresa tu teléfono.";
            return;
          }

          var url = window.SUPABASE_URL;
          var key = window.SUPABASE_ANON_KEY;
          if (!url || !key || url.indexOf("TU_PROYECTO") !== -1) {
            setStatus("Configura supabase-config.js con tu proyecto.", true);
            return;
          }

          btnEnviar.disabled = true;
          setStatus("Guardando…");

          var supabase = window.supabase.createClient(url, key);
          supabase.from("clientes_potenciales").insert({ nombre: nombre, telefono: telefono })
            .then(function (result) {
              btnEnviar.disabled = false;
              if (result.error) {
                setStatus(result.error.message || "Error al guardar.", true);
                return;
              }
              setStatus("Gracias. Hemos recibido tus datos y te contactaremos pronto.");
              form.reset();
            })
            .catch(function (err) {
              btnEnviar.disabled = false;
              setStatus(err.message || "Error de conexión.", true);
            });
        });
      })();
    </script>
  </body>
</html>
