<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso - Formulario de Pensión</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --accent: #8b5cf6;
        --danger: #ef4444;
        --shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        --radius: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell,
          Noto Sans, Helvetica Neue, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 20% 0%, rgba(139, 92, 246, 0.25), transparent 60%),
          radial-gradient(900px 600px at 90% 20%, rgba(34, 197, 94, 0.18), transparent 55%),
          var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .page {
        width: 100%;
        max-width: 400px;
      }

      .panel {
        background: linear-gradient(180deg, var(--panel), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        padding: 28px;
      }

      h1 {
        font-size: 1.5rem;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
        text-align: center;
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        line-height: 1.4;
      }

      .field {
        margin-bottom: 16px;
      }

      .field:last-of-type { margin-bottom: 24px; }

      label {
        display: block;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.86);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        color: var(--text);
        padding: 12px 14px;
        outline: none;
        font-size: 16px;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      input:focus {
        border-color: rgba(139, 92, 246, 0.8);
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18);
      }

      .error {
        font-size: 12px;
        color: var(--danger);
        margin-top: 6px;
      }

      button[type="submit"] {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }

      button[type="submit"]:hover { opacity: 0.95; }

      .links {
        margin-top: 20px;
        text-align: center;
      }

      .links a {
        color: var(--muted);
        font-size: 13px;
        text-decoration: none;
      }

      .links a:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel">
        <h1>Acceso al formulario de pensión</h1>
        <p class="subtitle">Ingresa tu email y contraseña para continuar</p>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
            <div class="error" id="error_email"></div>
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
            <div class="error" id="error_password"></div>
          </div>

          <div class="error" id="error_general"></div>

          <button type="submit">Entrar</button>
        </form>

        <p class="links">
          <a href="clientes.html">registro de afiliados (acceso público)</a>
        </p>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var form = document.getElementById("loginForm");
        var inputEmail = document.getElementById("email");
        var inputPassword = document.getElementById("password");
        var errorGeneral = document.getElementById("error_general");

        function clearErrors() {
          document.getElementById("error_email").textContent = "";
          document.getElementById("error_password").textContent = "";
          errorGeneral.textContent = "";
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          clearErrors();

          var email = (inputEmail.value || "").trim();
          var password = inputPassword.value || "";

          if (!email) {
            document.getElementById("error_email").textContent = "Ingresa tu email";
            inputEmail.focus();
            return;
          }

          if (!password) {
            document.getElementById("error_password").textContent = "Ingresa la contraseña";
            inputPassword.focus();
            return;
          }

          var url = window.SUPABASE_URL;
          var key = window.SUPABASE_ANON_KEY;
          if (!url || !key || url.indexOf("TU_PROYECTO") !== -1) {
            errorGeneral.textContent = "Configura supabase-config.js con tu URL y anon key de Supabase.";
            return;
          }

          var supabase = window.supabase.createClient(url, key);
          errorGeneral.textContent = "Conectando…";

          supabase.auth.signInWithPassword({ email: email, password: password })
            .then(function (result) {
              if (result.error) {
                errorGeneral.textContent = result.error.message || "Usuario o contraseña incorrectos.";
                inputPassword.value = "";
                inputPassword.focus();
                return;
              }
              window.location.href = "index.html";
            })
            .catch(function (err) {
              errorGeneral.textContent = err.message || "Error al conectar. Revisa la consola.";
            });
        });
      })();
    </script>
  </body>
</html>
