<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar sesión — Prevy</title>
    <meta name="theme-color" content="#00696c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="app-shell.css" />
    <script src="theme-init.js"></script>
    <script src="pwa-register.js" defer></script>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: radial-gradient(1000px 620px at 12% -8%, rgba(0, 223, 195, 0.14), transparent 58%),
          radial-gradient(820px 520px at 92% 12%, rgba(1, 147, 145, 0.16), transparent 52%),
          radial-gradient(700px 480px at 50% 100%, rgba(0, 96, 108, 0.08), transparent 55%),
          var(--surface);
      }

      .page {
        width: 100%;
        max-width: 400px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        padding: 28px;
      }

      h1 {
        font-size: 1.5rem;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
        text-align: center;
        color: var(--text);
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        line-height: 1.4;
      }

      .auth-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 22px;
        padding: 4px;
        background: rgba(0, 96, 108, 0.06);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
      }

      .auth-tab {
        flex: 1;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: var(--muted);
        font-family: inherit;
        transition: background 0.15s, color 0.15s;
      }

      .auth-tab:hover {
        color: var(--text);
      }

      .auth-tab.active {
        background: linear-gradient(135deg, rgba(0, 96, 108, 0.12) 0%, rgba(0, 223, 195, 0.2) 100%);
        color: var(--primary);
        box-shadow: 0 1px 8px rgba(0, 96, 108, 0.12);
      }

      .auth-tab:focus-visible {
        outline: 2px solid var(--primary-mid);
        outline-offset: 2px;
      }

      .auth-pane {
        display: none;
      }
      .auth-pane.active {
        display: block;
      }

      .field {
        margin-bottom: 16px;
      }

      .field:last-of-type {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 13px;
        color: var(--text);
        opacity: 0.9;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        padding: 12px 14px;
        outline: none;
        font-size: 16px;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      input:focus {
        border-color: var(--primary-mid);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      select {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        padding: 12px 10px;
        outline: none;
        font-size: 16px;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      select:focus {
        border-color: var(--primary-mid);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .phone-grid {
        display: grid;
        grid-template-columns: minmax(76px, 92px) 1fr;
        gap: 8px;
        align-items: stretch;
      }

      .phone-grid select {
        padding-left: 8px;
        padding-right: 6px;
        font-size: 15px;
      }

      .error {
        font-size: 12px;
        color: var(--danger);
        margin-top: 6px;
      }

      .success {
        font-size: 13px;
        color: var(--primary);
        line-height: 1.45;
        margin-bottom: 16px;
      }

      button[type="submit"] {
        width: 100%;
        padding: 14px;
        border-radius: var(--radius-sm);
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 70%, var(--accent-bright) 160%);
        color: #fff;
        font-family: inherit;
        box-shadow: 0 4px 16px rgba(0, 96, 108, 0.25);
      }

      button[type="submit"]:hover {
        filter: brightness(1.03);
      }

      button[type="submit"]:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        filter: none;
      }

      .oauth-divider {
        margin: 16px 0 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .oauth-divider::before,
      .oauth-divider::after {
        content: "";
        height: 1px;
        background: var(--border);
        flex: 1;
      }

      .btn-google {
        width: 100%;
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-google:hover {
        border-color: var(--primary-mid);
      }

      .btn-google:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .google-icon {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .links {
        margin-top: 20px;
        text-align: center;
      }

      .links a {
        color: var(--muted);
        font-size: 13px;
        text-decoration: none;
      }

      .links a:hover {
        color: var(--primary-mid);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        margin: -8px 0 16px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel">
        <h1>Acceso a Prevy</h1>
        <p class="subtitle">Área para asesores. Usa tu cuenta para gestionar clientes y trámites.</p>

        <div class="success" id="registerSuccess" style="display: none" role="status"></div>

        <div class="auth-tabs" role="tablist" aria-label="Tipo de acceso">
          <button type="button" class="auth-tab active" id="tabLogin" role="tab" aria-selected="true" aria-controls="paneLogin">
            Iniciar sesión
          </button>
          <button type="button" class="auth-tab" id="tabRegister" role="tab" aria-selected="false" aria-controls="paneRegister">
            Nuevo asesor
          </button>
        </div>

        <div id="paneLogin" class="auth-pane active" role="tabpanel" aria-labelledby="tabLogin">
          <form id="loginForm" novalidate>
            <div class="field">
              <label for="email">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
              />
              <div class="error" id="error_email"></div>
            </div>

            <div class="field">
              <label for="password">Contraseña</label>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
              <div class="error" id="error_password"></div>
            </div>

            <div class="error" id="error_general"></div>

            <button type="submit" id="btnLogin">Entrar</button>
            <div class="oauth-divider">o</div>
            <button type="button" class="btn-google" id="btnGoogleLogin">
              <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.55-.2-2.27H12v4.3h6.44a5.5 5.5 0 0 1-2.39 3.61v2.99h3.86c2.26-2.08 3.58-5.14 3.58-8.63z"/>
                <path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.95-2.9l-3.86-2.99c-1.07.72-2.44 1.15-4.09 1.15-3.14 0-5.8-2.12-6.75-4.97H1.27v3.09A12 12 0 0 0 12 24z"/>
                <path fill="#FBBC05" d="M5.25 14.29A7.2 7.2 0 0 1 4.87 12c0-.79.14-1.56.38-2.29V6.62H1.27A12 12 0 0 0 0 12c0 1.94.46 3.78 1.27 5.38l3.98-3.09z"/>
                <path fill="#EA4335" d="M12 4.77c1.76 0 3.34.6 4.58 1.79l3.44-3.44C17.95 1.2 15.24 0 12 0A12 12 0 0 0 1.27 6.62l3.98 3.09c.95-2.85 3.61-4.94 6.75-4.94z"/>
              </svg>
              <span>Continuar con Google</span>
            </button>
          </form>
        </div>

        <div id="paneRegister" class="auth-pane" role="tabpanel" aria-labelledby="tabRegister" hidden>
          <p class="hint" id="registerPolicyHint">Crea una cuenta con el correo que usarás como asesor. Si tu proyecto Supabase exige confirmar el email, revisa la bandeja de entrada antes de entrar.</p>
          <form id="registerForm" novalidate>
            <div class="field">
              <label for="regEmail">Email</label>
              <input
                id="regEmail"
                name="regEmail"
                type="email"
                autocomplete="email"
                required
              />
              <div class="error" id="error_reg_email"></div>
            </div>

            <div class="field">
              <label for="regPhone">Teléfono</label>
              <div class="phone-grid">
                <select id="regPhoneCountry" name="regPhoneCountry" autocomplete="tel-country-code" required>
                  <option value="56" selected>🇨🇱 +56</option>
                  <option value="54">🇦🇷 +54</option>
                  <option value="51">🇵🇪 +51</option>
                  <option value="57">🇨🇴 +57</option>
                  <option value="52">🇲🇽 +52</option>
                  <option value="34">🇪🇸 +34</option>
                  <option value="1">🇺🇸🇨🇦 +1</option>
                </select>
                <input
                  id="regPhone"
                  name="regPhone"
                  type="tel"
                  autocomplete="tel-national"
                  required
                  placeholder="Ej. 9 1234 5678"
                />
              </div>
              <div class="error" id="error_reg_phone"></div>
            </div>

            <div class="field">
              <label for="regPassword">Contraseña</label>
              <input
                id="regPassword"
                name="regPassword"
                type="password"
                autocomplete="new-password"
                required
                minlength="6"
              />
              <div class="error" id="error_reg_password"></div>
            </div>

            <div class="field">
              <label for="regPassword2">Repetir contraseña</label>
              <input
                id="regPassword2"
                name="regPassword2"
                type="password"
                autocomplete="new-password"
                required
                minlength="6"
              />
              <div class="error" id="error_reg_password2"></div>
            </div>

            <div class="error" id="error_register_general"></div>

            <button type="submit" id="btnRegister">Crear cuenta</button>
            <div class="oauth-divider">o</div>
            <button type="button" class="btn-google" id="btnGoogleRegister">
              <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.55-.2-2.27H12v4.3h6.44a5.5 5.5 0 0 1-2.39 3.61v2.99h3.86c2.26-2.08 3.58-5.14 3.58-8.63z"/>
                <path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.95-2.9l-3.86-2.99c-1.07.72-2.44 1.15-4.09 1.15-3.14 0-5.8-2.12-6.75-4.97H1.27v3.09A12 12 0 0 0 12 24z"/>
                <path fill="#FBBC05" d="M5.25 14.29A7.2 7.2 0 0 1 4.87 12c0-.79.14-1.56.38-2.29V6.62H1.27A12 12 0 0 0 0 12c0 1.94.46 3.78 1.27 5.38l3.98-3.09z"/>
                <path fill="#EA4335" d="M12 4.77c1.76 0 3.34.6 4.58 1.79l3.44-3.44C17.95 1.2 15.24 0 12 0A12 12 0 0 0 1.27 6.62l3.98 3.09c.95-2.85 3.61-4.94 6.75-4.94z"/>
              </svg>
              <span>Registrar con Google</span>
            </button>
          </form>
        </div>

        <p class="links">
          <a href="clientes.html">Registro de Afiliados</a>
        </p>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        try {
          var sp = new URLSearchParams(window.location.search || "");
          var raw = (sp.get("ref") || sp.get("referral") || "")
            .trim()
            .toUpperCase()
            .replace(/[^A-Z0-9]/g, "");
          if (raw.length >= 4) sessionStorage.setItem("prevy_ref", raw.slice(0, 16));
        } catch (eRefUrl) {}

        function getPendingRefCode() {
          try {
            var s = sessionStorage.getItem("prevy_ref") || sessionStorage.getItem("hablemos_ref");
            return s && String(s).length >= 4 ? String(s) : "";
          } catch (e) {
            return "";
          }
        }

        function tryReferralBindAfterAuth(accessToken, done) {
          done = typeof done === "function" ? done : function () {};
          if (!accessToken) {
            done();
            return;
          }
          var fromStorage = getPendingRefCode();
          fetch(window.location.origin + "/.netlify/functions/referral-bind", {
            method: "POST",
            headers: {
              Authorization: "Bearer " + accessToken,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(fromStorage ? { code: fromStorage } : {}),
          })
            .catch(function () {})
            .finally(function () {
              if (fromStorage) {
                try {
                  sessionStorage.removeItem("prevy_ref");
                  sessionStorage.removeItem("hablemos_ref");
                } catch (e2) {}
              }
              done();
            });
        }

        var tabLogin = document.getElementById("tabLogin");
        var tabRegister = document.getElementById("tabRegister");
        var paneLogin = document.getElementById("paneLogin");
        var paneRegister = document.getElementById("paneRegister");

        var formLogin = document.getElementById("loginForm");
        var formRegister = document.getElementById("registerForm");
        var inputEmail = document.getElementById("email");
        var inputPassword = document.getElementById("password");
        var errorGeneral = document.getElementById("error_general");

        var regEmail = document.getElementById("regEmail");
        var regPhoneCountry = document.getElementById("regPhoneCountry");
        var regPhone = document.getElementById("regPhone");
        var regPassword = document.getElementById("regPassword");
        var regPassword2 = document.getElementById("regPassword2");
        var errorRegisterGeneral = document.getElementById("error_register_general");
        var registerPolicyHint = document.getElementById("registerPolicyHint");
        var registerSuccess = document.getElementById("registerSuccess");
        var btnLogin = document.getElementById("btnLogin");
        var btnRegister = document.getElementById("btnRegister");
        var btnGoogleLogin = document.getElementById("btnGoogleLogin");
        var btnGoogleRegister = document.getElementById("btnGoogleRegister");
        var REGISTRO_ASESORES_HABILITADO = window.ASESOR_REGISTRO_HABILITADO === true;
        var REGISTRO_ASESORES_DOMINIOS = Array.isArray(window.ASESOR_REGISTRO_DOMINIOS)
          ? window.ASESOR_REGISTRO_DOMINIOS.map(function (d) { return String(d || "").trim().toLowerCase(); }).filter(Boolean)
          : [];

        function showPane(which) {
          var isLogin = which === "login";
          tabLogin.classList.toggle("active", isLogin);
          tabRegister.classList.toggle("active", !isLogin);
          tabLogin.setAttribute("aria-selected", isLogin);
          tabRegister.setAttribute("aria-selected", !isLogin);
          paneLogin.classList.toggle("active", isLogin);
          paneRegister.classList.toggle("active", !isLogin);
          paneLogin.hidden = !isLogin;
          paneRegister.hidden = isLogin;
          if (isLogin) {
            clearLoginErrors();
            errorRegisterGeneral.textContent = "";
          } else {
            clearRegisterErrors();
            errorGeneral.textContent = "";
            registerSuccess.style.display = "none";
            registerSuccess.textContent = "";
          }
        }

        (function showIdleReasonMessage() {
          try {
            var params = new URLSearchParams(window.location.search || "");
            if (params.get("reason") !== "idle") return;
            errorGeneral.textContent = "Tu sesión se cerró automáticamente por inactividad (1 hora).";
            showPane("login");
          } catch (_e) {
            // no-op
          }
        })();

        tabLogin.addEventListener("click", function () { showPane("login"); });
        tabRegister.addEventListener("click", function () { showPane("register"); });

        function clearLoginErrors() {
          document.getElementById("error_email").textContent = "";
          document.getElementById("error_password").textContent = "";
          errorGeneral.textContent = "";
        }

        function clearRegisterErrors() {
          document.getElementById("error_reg_email").textContent = "";
          document.getElementById("error_reg_phone").textContent = "";
          document.getElementById("error_reg_password").textContent = "";
          document.getElementById("error_reg_password2").textContent = "";
          errorRegisterGeneral.textContent = "";
        }

        function dominioEmail(email) {
          var e = String(email || "");
          var i = e.lastIndexOf("@");
          if (i === -1) return "";
          return e.slice(i + 1).toLowerCase().trim();
        }

        function normalizarEmail(email) {
          return String(email || "")
            .replace(/[\u200B-\u200D\uFEFF]/g, "")
            .trim()
            .toLowerCase();
        }

        function emailPareceValido(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normalizarEmail(email));
        }

        function canonizarTelefono(countryCode, phone) {
          var cc = String(countryCode || "").replace(/\D/g, "");
          var raw = String(phone || "").trim();
          var digits = raw.replace(/\D/g, "");
          if (!cc || !digits) return "";

          // Si el usuario pega el numero completo con codigo pais, se lo quitamos.
          if (digits.indexOf(cc) === 0) digits = digits.slice(cc.length);
          while (digits.indexOf("0") === 0) digits = digits.slice(1);

          // E.164: maximo 15 digitos incluyendo codigo de pais.
          if (digits.length < 6 || (cc.length + digits.length) > 15) return "";
          if (cc === "56" && (digits.length < 8 || digits.length > 9)) return "";

          return "+" + cc + digits;
        }

        function formatearTelefonoVisible(countryCode, phoneCanon) {
          var cc = String(countryCode || "").replace(/\D/g, "");
          var canon = String(phoneCanon || "");
          if (!cc || canon.indexOf("+" + cc) !== 0) return canon;
          return canon.slice(cc.length + 1);
        }

        regPhoneCountry.addEventListener("change", function () {
          var canon = canonizarTelefono(regPhoneCountry.value, regPhone.value);
          if (canon) regPhone.value = formatearTelefonoVisible(regPhoneCountry.value, canon);
        });

        regPhone.addEventListener("blur", function () {
          var canon = canonizarTelefono(regPhoneCountry.value, regPhone.value);
          if (canon) regPhone.value = formatearTelefonoVisible(regPhoneCountry.value, canon);
        });

        function setupRegisterPolicyUi() {
          var reglas = [];
          if (!REGISTRO_ASESORES_HABILITADO) {
            tabRegister.disabled = true;
            tabRegister.title = "Registro cerrado por el administrador";
            tabRegister.classList.remove("active");
            paneRegister.hidden = true;
            paneRegister.classList.remove("active");
            registerPolicyHint.textContent = "El registro de nuevos asesores está cerrado. Solicita un alta al administrador.";
            btnRegister.disabled = true;
            showPane("login");
            return;
          }

          tabRegister.disabled = false;
          btnRegister.disabled = false;

          if (REGISTRO_ASESORES_DOMINIOS.length) {
            reglas.push("dominios permitidos: " + REGISTRO_ASESORES_DOMINIOS.join(", "));
          }

          if (reglas.length) {
            registerPolicyHint.textContent = "Registro limitado: " + reglas.join(" | ") + ".";
          }
        }

        function getSupabase() {
          var url = window.SUPABASE_URL;
          var key = window.SUPABASE_ANON_KEY;
          if (!url || !key || url.indexOf("TU_PROYECTO") !== -1) {
            return { error: "Configura supabase-config.js con tu URL y anon key de Supabase." };
          }
          return { client: window.supabase.createClient(url, key) };
        }

        function mapAuthError(msg) {
          if (!msg) return "No se pudo completar la operación.";
          var m = String(msg).toLowerCase();
          if (m.indexOf("email address is invalid") !== -1 || m.indexOf("invalid email") !== -1) {
            return "El formato del email no es válido (ejemplo: nombre@dominio.com).";
          }
          if (m.indexOf("already registered") !== -1 || m.indexOf("user already") !== -1) {
            return "Ese email ya tiene cuenta. Inicia sesión o recupera la contraseña desde Supabase.";
          }
          if (m.indexOf("password") !== -1 && m.indexOf("least") !== -1) {
            return "La contraseña no cumple la longitud mínima que exige tu proyecto (suele ser 6 caracteres o más).";
          }
          if (m.indexOf("invalid login") !== -1 || m.indexOf("invalid credentials") !== -1) {
            return "Email o contraseña incorrectos.";
          }
          return msg;
        }

        function getOAuthReturnUrl(mode) {
          var base = window.location.origin + window.location.pathname;
          return base + "?oauth=google&mode=" + encodeURIComponent(mode || "login");
        }

        function disableGoogleButtons(disabled) {
          if (btnGoogleLogin) btnGoogleLogin.disabled = disabled;
          if (btnGoogleRegister) btnGoogleRegister.disabled = disabled;
        }

        function iniciarGoogle(mode) {
          var sb = getSupabase();
          if (sb.error) {
            if (mode === "register") errorRegisterGeneral.textContent = sb.error;
            else errorGeneral.textContent = sb.error;
            return;
          }

          if (mode === "register") {
            clearRegisterErrors();
            if (!REGISTRO_ASESORES_HABILITADO) {
              errorRegisterGeneral.textContent = "El registro de nuevos asesores está deshabilitado.";
              return;
            }
            var phoneRaw = (regPhone.value || "").trim();
            var phoneCanon = canonizarTelefono(regPhoneCountry.value, phoneRaw);
            if (!phoneRaw || !phoneCanon) {
              document.getElementById("error_reg_phone").textContent =
                "Para registrar con Google, ingresa primero un teléfono válido.";
              regPhone.focus();
              return;
            }
            sessionStorage.setItem("google_register_phone", phoneCanon);
            sessionStorage.setItem("google_register_started", "1");
          } else {
            clearLoginErrors();
          }

          disableGoogleButtons(true);
          var targetError = mode === "register" ? errorRegisterGeneral : errorGeneral;
          targetError.textContent = "Redirigiendo a Google…";

          sb.client.auth
            .signInWithOAuth({
              provider: "google",
              options: {
                redirectTo: getOAuthReturnUrl(mode),
              },
            })
            .then(function (result) {
              disableGoogleButtons(false);
              if (result && result.error) {
                targetError.textContent = mapAuthError(result.error.message);
              }
            })
            .catch(function (err) {
              disableGoogleButtons(false);
              targetError.textContent = err && err.message ? err.message : "No se pudo iniciar sesión con Google.";
            });
        }

        formLogin.addEventListener("submit", function (e) {
          e.preventDefault();
          clearLoginErrors();

          var email = normalizarEmail(inputEmail.value);
          inputEmail.value = email;
          var password = inputPassword.value || "";

          if (!email) {
            document.getElementById("error_email").textContent = "Ingresa tu email";
            inputEmail.focus();
            return;
          }
          if (!emailPareceValido(email)) {
            document.getElementById("error_email").textContent = "Email inválido (usa formato nombre@dominio.com)";
            inputEmail.focus();
            return;
          }

          if (!password) {
            document.getElementById("error_password").textContent = "Ingresa la contraseña";
            inputPassword.focus();
            return;
          }

          var sb = getSupabase();
          if (sb.error) {
            errorGeneral.textContent = sb.error;
            return;
          }

          btnLogin.disabled = true;
          errorGeneral.textContent = "Conectando…";

          sb.client.auth
            .signInWithPassword({ email: email, password: password })
            .then(function (result) {
              btnLogin.disabled = false;
              if (result.error) {
                errorGeneral.textContent = mapAuthError(result.error.message);
                inputPassword.value = "";
                inputPassword.focus();
                return;
              }
              var tok = result.data && result.data.session && result.data.session.access_token;
              tryReferralBindAfterAuth(tok, function () {
                window.location.href = "dashboard.html";
              });
            })
            .catch(function (err) {
              btnLogin.disabled = false;
              errorGeneral.textContent = err.message || "Error al conectar.";
            });
        });

        formRegister.addEventListener("submit", function (e) {
          e.preventDefault();
          clearRegisterErrors();
          registerSuccess.style.display = "none";
          registerSuccess.textContent = "";

          if (!REGISTRO_ASESORES_HABILITADO) {
            errorRegisterGeneral.textContent = "El registro de nuevos asesores está deshabilitado.";
            return;
          }

          var email = normalizarEmail(regEmail.value);
          regEmail.value = email;
          var phoneRaw = (regPhone.value || "").trim();
          var phoneCanon = canonizarTelefono(regPhoneCountry.value, phoneRaw);
          regPhone.value = phoneCanon ? formatearTelefonoVisible(regPhoneCountry.value, phoneCanon) : phoneRaw;
          var p1 = regPassword.value || "";
          var p2 = regPassword2.value || "";

          if (!email) {
            document.getElementById("error_reg_email").textContent = "Ingresa tu email";
            regEmail.focus();
            return;
          }
          if (!emailPareceValido(email)) {
            document.getElementById("error_reg_email").textContent = "Email inválido (usa formato nombre@dominio.com)";
            regEmail.focus();
            return;
          }

          if (!phoneRaw) {
            document.getElementById("error_reg_phone").textContent = "Ingresa tu teléfono";
            regPhone.focus();
            return;
          }
          if (!phoneCanon) {
            document.getElementById("error_reg_phone").textContent = "Ingresa un telefono valido para el codigo de pais seleccionado";
            regPhone.focus();
            return;
          }

          if (!p1) {
            document.getElementById("error_reg_password").textContent = "Elige una contraseña";
            regPassword.focus();
            return;
          }

          if (p1.length < 6) {
            document.getElementById("error_reg_password").textContent = "Mínimo 6 caracteres (ajusta según tu política en Supabase).";
            regPassword.focus();
            return;
          }

          if (p1 !== p2) {
            document.getElementById("error_reg_password2").textContent = "Las contraseñas no coinciden";
            regPassword2.focus();
            return;
          }

          if (REGISTRO_ASESORES_DOMINIOS.length) {
            var d = dominioEmail(email);
            if (REGISTRO_ASESORES_DOMINIOS.indexOf(d) === -1) {
              document.getElementById("error_reg_email").textContent =
                "Solo se permite registro con dominios autorizados: " + REGISTRO_ASESORES_DOMINIOS.join(", ");
              regEmail.focus();
              return;
            }
          }

          var sb = getSupabase();
          if (sb.error) {
            errorRegisterGeneral.textContent = sb.error;
            return;
          }

          btnRegister.disabled = true;
          errorRegisterGeneral.textContent = "Creando cuenta…";

          var regMeta = { telefono: phoneCanon };
          var refPending = getPendingRefCode();
          if (refPending) regMeta.referral_code_used = refPending;

          sb.client.auth
            .signUp({
              email: email,
              password: p1,
              options: {
                data: regMeta
              }
            })
            .then(function (result) {
              btnRegister.disabled = false;
              if (result.error) {
                errorRegisterGeneral.textContent = mapAuthError(result.error.message);
                return;
              }

              errorRegisterGeneral.textContent = "";

              if (result.data && result.data.session) {
                var tok = result.data.session.access_token;
                tryReferralBindAfterAuth(tok, function () {
                  window.location.href = "dashboard.html";
                });
                return;
              }

              registerSuccess.style.display = "block";
              registerSuccess.textContent =
                "Cuenta creada. Si tu proyecto requiere confirmar el email, abre el enlace que te enviamos y luego usa «Iniciar sesión». Si la confirmación está desactivada en Supabase, entra ahora con tu email y contraseña.";
              regPassword.value = "";
              regPassword2.value = "";
              showPane("login");
              inputEmail.value = email;
              inputPassword.value = "";
              inputPassword.focus();
            })
            .catch(function (err) {
              btnRegister.disabled = false;
              errorRegisterGeneral.textContent = err.message || "Error al registrar.";
            });
        });

        btnGoogleLogin.addEventListener("click", function () {
          iniciarGoogle("login");
        });

        btnGoogleRegister.addEventListener("click", function () {
          iniciarGoogle("register");
        });

        (function handleGoogleCallback() {
          var params = new URLSearchParams(window.location.search || "");
          if (params.get("oauth") !== "google") return;

          var mode = params.get("mode") || "login";
          var sb = getSupabase();
          if (sb.error) {
            if (mode === "register") errorRegisterGeneral.textContent = sb.error;
            else errorGeneral.textContent = sb.error;
            return;
          }

          sb.client.auth.getSession().then(function (res) {
            var session = res && res.data ? res.data.session : null;
            if (!session || !session.user) {
              if (mode === "register") {
                showPane("register");
                errorRegisterGeneral.textContent = "No se pudo completar la autenticación con Google.";
              } else {
                showPane("login");
                errorGeneral.textContent = "No se pudo completar la autenticación con Google.";
              }
              return;
            }

            var user = session.user;
            if (mode === "register") {
              var dom = dominioEmail(user.email || "");
              if (REGISTRO_ASESORES_DOMINIOS.length && REGISTRO_ASESORES_DOMINIOS.indexOf(dom) === -1) {
                sb.client.auth.signOut().finally(function () {
                  showPane("register");
                  errorRegisterGeneral.textContent =
                    "Tu cuenta Google no pertenece a un dominio autorizado: " + REGISTRO_ASESORES_DOMINIOS.join(", ");
                });
                return;
              }

              var phoneCanon = sessionStorage.getItem("google_register_phone") || "";
              var phoneActual =
                (user.user_metadata && (user.user_metadata.telefono || user.user_metadata.phone)) || "";
              var needsPhoneUpdate = !!phoneCanon && phoneActual !== phoneCanon;
              var refGoogle = getPendingRefCode();
              if (!needsPhoneUpdate) {
                sessionStorage.removeItem("google_register_phone");
                sessionStorage.removeItem("google_register_started");
                var goDash = function () {
                  tryReferralBindAfterAuth(session.access_token, function () {
                    window.location.href = "dashboard.html";
                  });
                };
                if (refGoogle) {
                  sb.client.auth
                    .updateUser({ data: { referral_code_used: refGoogle } })
                    .finally(goDash);
                } else {
                  goDash();
                }
                return;
              }

              var googleMeta = { telefono: phoneCanon };
              if (refGoogle) googleMeta.referral_code_used = refGoogle;

              sb.client.auth
                .updateUser({
                  data: googleMeta,
                })
                .then(function (upd) {
                  sessionStorage.removeItem("google_register_phone");
                  sessionStorage.removeItem("google_register_started");
                  if (upd && upd.error) {
                    showPane("register");
                    errorRegisterGeneral.textContent =
                      "Google autenticó correctamente, pero no pudimos guardar tu teléfono. Intenta iniciar sesión y actualízalo.";
                    return;
                  }
                  tryReferralBindAfterAuth(session.access_token, function () {
                    window.location.href = "dashboard.html";
                  });
                })
                .catch(function () {
                  showPane("register");
                  errorRegisterGeneral.textContent =
                    "Google autenticó correctamente, pero no pudimos guardar tu teléfono. Intenta iniciar sesión y actualízalo.";
                });
              return;
            }

            tryReferralBindAfterAuth(session.access_token, function () {
              window.location.href = "dashboard.html";
            });
          });
        })();

        setupRegisterPolicyUi();
      })();
    </script>
  </body>
</html>
