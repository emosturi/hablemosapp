# Deploy desde la RAÍZ: la raíz del dominio (apex y www) muestra la landing en /www/index.html.
# La app sigue en /dashboard.html, /login.html, etc.
# Si más adelante usás un sitio Netlify solo para plataforma.*, allí podés volver a poner / → dashboard.

# process-reminders: cada 5 min (pruebas); en producción cambiar a "*/15 * * * *"
[functions."process-reminders"]
  schedule = "*/5 * * * *"

# Enlaces antiguos: raíz con parámetros del formulario pensión
[[redirects]]
  from = "/"
  to = "/pension.html"
  status = 302
  query = { cliente = ":cliente" }

[[redirects]]
  from = "/"
  to = "/pension.html"
  status = 302
  query = { imprimir = ":imprimir" }

# Subdominio plataforma: raíz → panel (Host explícito; debe estar en DNS y como dominio del sitio en Netlify)
[[redirects]]
  from = "https://plataforma.hablemospensiones.cl/"
  to = "/dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "https://plataforma.hablemospensiones.cl/index.html"
  to = "/dashboard.html"
  status = 200
  force = true

# Raíz en apex / www / *.netlify.app: landing
[[redirects]]
  from = "/"
  to = "/www/index.html"
  status = 200
  force = true

# Quien abra /index.html explícito también ve la landing
[[redirects]]
  from = "/index.html"
  to = "/www/index.html"
  status = 200
  force = true
