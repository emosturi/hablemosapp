# Un solo deploy: app (PWA) + landings por host.
#
# Matriz de hosts (añade cada dominio en Netlify → Domain management + DNS):
#   plataforma.prevy.cl          → app (raíz = dashboard)
#   www.prevy.cl, prevy.cl       → landing comercial Prevy (/prevy-landing/)
#   www.hablemosdepension.cl,
#   hablemosdepension.cl         → misma landing larga /www/index.html (catch-all; «Acceso equipo» → plataforma.prevy.cl vía site-urls.js)
#   plataforma.hablemosdepension.cl, plataforma.hablemospensiones.cl → app (legacy)
#   *.netlify.app y otros alias  → landing /www/index.html
#
# Orden: reglas más específicas (host completo en `from`) antes que el catch-all `/`.

[functions."process-reminders"]
  schedule = "*/5 * * * *"

# Raíz con parámetros del formulario pensión (cualquier host)
[[redirects]]
  from = "/"
  to = "/pension.html"
  status = 302
  query = { cliente = ":cliente" }

[[redirects]]
  from = "/"
  to = "/pension.html"
  status = 302
  query = { imprimir = ":imprimir" }

# --- Plataforma Prevy (PWA) ---
[[redirects]]
  from = "https://plataforma.prevy.cl/"
  to = "/dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "https://plataforma.prevy.cl/index.html"
  to = "/dashboard.html"
  status = 200
  force = true

# --- Plataforma legacy (mantener hasta migración DNS completa) ---
[[redirects]]
  from = "https://plataforma.hablemosdepension.cl/"
  to = "/dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "https://plataforma.hablemosdepension.cl/index.html"
  to = "/dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "https://plataforma.hablemospensiones.cl/"
  to = "/dashboard.html"
  status = 200
  force = true

[[redirects]]
  from = "https://plataforma.hablemospensiones.cl/index.html"
  to = "/dashboard.html"
  status = 200
  force = true

# --- Landing marketing Prevy (www.prevy.cl + apex) ---
[[redirects]]
  from = "https://www.prevy.cl/"
  to = "/prevy-landing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://www.prevy.cl/index.html"
  to = "/prevy-landing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://prevy.cl/"
  to = "/prevy-landing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://prevy.cl/index.html"
  to = "/prevy-landing/index.html"
  status = 200
  force = true

# --- Default: landing larga /www/index.html (hablemosdepension.cl, netlify.app, etc.) ---
[[redirects]]
  from = "/"
  to = "/www/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/index.html"
  to = "/www/index.html"
  status = 200
  force = true
