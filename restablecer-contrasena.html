<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nueva contraseña — Prevy</title>
    <meta name="theme-color" content="#00696c" />
    <link rel="stylesheet" href="app-shell.css" />
    <script src="theme-init.js"></script>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: radial-gradient(1000px 620px at 12% -8%, rgba(0, 223, 195, 0.14), transparent 58%),
          radial-gradient(820px 520px at 92% 12%, rgba(1, 147, 145, 0.16), transparent 52%),
          radial-gradient(700px 480px at 50% 100%, rgba(0, 96, 108, 0.08), transparent 55%),
          var(--surface);
      }
      .page {
        width: 100%;
        max-width: 400px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
        text-align: center;
        color: var(--text);
      }
      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        line-height: 1.4;
      }
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--text);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        padding: 12px 14px;
        font-size: 16px;
        font-family: inherit;
      }
      input:focus {
        outline: none;
        border-color: var(--primary-mid);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }
      .error {
        font-size: 12px;
        color: var(--danger);
        margin-top: 6px;
      }
      button[type="submit"] {
        width: 100%;
        padding: 14px;
        border-radius: var(--radius-sm);
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 70%, var(--accent-bright) 160%);
        color: #fff;
        font-family: inherit;
        margin-top: 4px;
      }
      button[type="submit"]:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .back {
        margin-top: 20px;
        text-align: center;
      }
      .back a {
        color: var(--muted);
        font-size: 14px;
        text-decoration: none;
      }
      .back a:hover {
        color: var(--primary-mid);
      }
      #stateLoading {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }
      #stateInvalid {
        color: var(--danger);
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel">
        <h1>Nueva contraseña</h1>
        <p class="subtitle" id="subTitle">Establece una contraseña nueva para tu cuenta.</p>

        <div id="stateLoading">Validando enlace…</div>
        <div id="stateInvalid" hidden></div>

        <form id="resetForm" hidden novalidate>
          <div class="field">
            <label for="newPass1">Nueva contraseña</label>
            <input id="newPass1" type="password" autocomplete="new-password" required minlength="6" />
            <div class="error" id="error_pass1"></div>
          </div>
          <div class="field">
            <label for="newPass2">Repetir contraseña</label>
            <input id="newPass2" type="password" autocomplete="new-password" required minlength="6" />
            <div class="error" id="error_pass2"></div>
          </div>
          <div class="error" id="error_reset_general"></div>
          <button type="submit" id="btnSavePass">Guardar contraseña</button>
        </form>

        <p class="back"><a href="login.html">← Volver al inicio de sesión</a></p>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var url = window.SUPABASE_URL;
        var key = window.SUPABASE_ANON_KEY;
        var loadingEl = document.getElementById("stateLoading");
        var invalidEl = document.getElementById("stateInvalid");
        var form = document.getElementById("resetForm");
        var subTitle = document.getElementById("subTitle");
        var p1 = document.getElementById("newPass1");
        var p2 = document.getElementById("newPass2");
        var err1 = document.getElementById("error_pass1");
        var err2 = document.getElementById("error_pass2");
        var errGen = document.getElementById("error_reset_general");
        var btn = document.getElementById("btnSavePass");

        if (!url || !key || url.indexOf("TU_PROYECTO") !== -1) {
          loadingEl.hidden = true;
          invalidEl.hidden = false;
          invalidEl.textContent = "Falta configurar Supabase (supabase-config.js).";
          return;
        }

        var supabase = window.createPrevySupabaseClient
          ? window.createPrevySupabaseClient(url, key)
          : window.supabase && window.supabase.createClient(url, key);
        if (!supabase) {
          loadingEl.hidden = true;
          invalidEl.hidden = false;
          invalidEl.textContent = "No se pudo iniciar el cliente.";
          return;
        }

        var recoveryHint =
          /type=recovery|type%3Drecovery/.test(
            (window.location.hash || "") + (window.location.search || "")
          );

        var showedForm = false;
        function showForm() {
          if (showedForm) return;
          showedForm = true;
          loadingEl.hidden = true;
          invalidEl.hidden = true;
          form.hidden = false;
          subTitle.textContent = "Escribe tu nueva contraseña.";
        }

        function showInvalid(msg) {
          if (showedForm) return;
          loadingEl.hidden = true;
          invalidEl.hidden = false;
          invalidEl.textContent =
            msg ||
            "Este enlace no es válido o ya expiró. Solicita uno nuevo desde «Olvidé mi contraseña» en el inicio de sesión.";
        }

        supabase.auth.onAuthStateChange(function (event, _session) {
          if (event === "PASSWORD_RECOVERY") {
            showForm();
          }
        });

        supabase.auth.getSession().then(function (res) {
          var sess = res && res.data && res.data.session;
          if (sess && recoveryHint) {
            showForm();
          }
        });

        setTimeout(function () {
          if (showedForm) return;
          supabase.auth.getSession().then(function (res) {
            var sess = res && res.data && res.data.session;
            if (sess && recoveryHint) {
              showForm();
              return;
            }
            if (!showedForm) {
              showInvalid(null);
            }
          });
        }, 5000);

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          err1.textContent = "";
          err2.textContent = "";
          errGen.textContent = "";

          var a = p1.value || "";
          var b = p2.value || "";
          if (a.length < 6) {
            err1.textContent = "Mínimo 6 caracteres (o lo que exija tu proyecto en Supabase).";
            return;
          }
          if (a !== b) {
            err2.textContent = "Las contraseñas no coinciden";
            return;
          }

          btn.disabled = true;
          errGen.textContent = "Guardando…";

          supabase.auth
            .updateUser({ password: a })
            .then(function (r) {
              btn.disabled = false;
              errGen.textContent = "";
              if (r.error) {
                errGen.textContent = r.error.message || "No se pudo actualizar.";
                return;
              }
              form.hidden = true;
              subTitle.textContent = "Contraseña actualizada. Ya puedes iniciar sesión.";
              loadingEl.hidden = false;
              loadingEl.textContent = "Redirigiendo al inicio de sesión…";
              setTimeout(function () {
                window.location.href = "login.html";
              }, 1200);
            })
            .catch(function (err) {
              btn.disabled = false;
              errGen.textContent = (err && err.message) || "Error al guardar.";
            });
        });
      })();
    </script>
  </body>
</html>
