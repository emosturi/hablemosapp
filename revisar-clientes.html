<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Revisar clientes</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --accent: #8b5cf6;
        --danger: #ef4444;
        --shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        --radius: 16px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 20% 0%, rgba(139, 92, 246, 0.25), transparent 60%),
          radial-gradient(900px 600px at 90% 20%, rgba(34, 197, 94, 0.18), transparent 55%), var(--bg);
        min-height: 100vh;
      }
      .page { max-width: 1000px; margin: 0 auto; padding: 28px 16px 60px; }
      header { margin: 10px 0 18px; }
      h1 { font-size: clamp(22px, 2.6vw, 32px); letter-spacing: -0.02em; margin: 0; }
      .subtitle { margin: 8px 0 0; color: var(--muted); line-height: 1.4; }
      .panel {
        background: linear-gradient(180deg, var(--panel), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        padding: 18px;
      }
      a.back, a.header-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
      }
      a.back:hover, a.header-link:hover { color: var(--text); }
      .header-links { margin: 12px 0 0; }
      .header-links a { margin-right: 12px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-size: 12px; text-transform: uppercase; }
      .btn-use {
        padding: 8px 14px;
        border-radius: 10px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        display: inline-block;
      }
      .btn-use:hover { opacity: 0.95; }
      .loading { color: var(--muted); padding: 20px; }
      .error-msg { color: var(--danger); padding: 20px; }
      .empty { color: var(--muted); padding: 20px; }
    </style>
  </head>
  <body>
    <div class="page">
      <a href="index.html" class="back">← Formulario de pensión</a>
      <header>
        <h1>Revisar clientes</h1>
        <p class="subtitle">Clientes que se han registrado. Revisa los datos y úsalos para llenar el formulario de mandatos y contratos.</p>
        <p class="header-links">
          <a href="clientes.html" class="header-link">Alta de clientes (público)</a>
        </p>
      </header>

      <div class="panel">
        <div id="loading" class="loading">Cargando clientes…</div>
        <div id="error" class="error-msg" style="display:none;"></div>
        <div id="empty" class="empty" style="display:none;">No hay clientes registrados.</div>
        <table id="tabla" style="display:none;">
          <thead>
            <tr>
              <th>RUT</th>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Registro</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var url = window.SUPABASE_URL;
        var key = window.SUPABASE_ANON_KEY;
        if (!url || !key || url.indexOf("TU_PROYECTO") !== -1) {
          window.location.replace("login.html");
          return;
        }
        var supabase = window.supabase.createClient(url, key);

        supabase.auth.getSession().then(function (r) {
          if (!r.data.session) {
            window.location.replace("login.html");
            return;
          }

          document.getElementById("loading").style.display = "block";
          supabase.from("clientes").select("id, rut, nombres, apellido_paterno, apellido_materno, telefono, created_at").order("created_at", { ascending: false })
            .then(function (result) {
              document.getElementById("loading").style.display = "none";
              if (result.error) {
                document.getElementById("error").style.display = "block";
                document.getElementById("error").textContent = result.error.message || "Error al cargar.";
                return;
              }
              var list = result.data || [];
              if (list.length === 0) {
                document.getElementById("empty").style.display = "block";
                return;
              }
              document.getElementById("tabla").style.display = "table";
              var tbody = document.getElementById("tbody");
              list.forEach(function (c) {
                var nombre = [c.nombres, c.apellido_paterno, c.apellido_materno].filter(Boolean).join(" ");
                var fecha = c.created_at ? new Date(c.created_at).toLocaleDateString("es-CL") : "";
                var tr = document.createElement("tr");
                tr.innerHTML =
                  "<td>" + (c.rut || "") + "</td>" +
                  "<td>" + (nombre || "-") + "</td>" +
                  "<td>" + (c.telefono || "-") + "</td>" +
                  "<td>" + fecha + "</td>" +
                  '<td><a href="index.html?cliente=' + encodeURIComponent(c.id) + '" class="btn-use">Usar en formulario de pensión</a></td>';
                tbody.appendChild(tr);
              });
            });
        });
      })();
    </script>
  </body>
</html>
