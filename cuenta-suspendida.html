<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cuenta no disponible - HablemosApp</title>
    <link rel="stylesheet" href="app-shell.css" />
    <script src="theme-init.js"></script>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: radial-gradient(1000px 620px at 12% -8%, rgba(0, 223, 195, 0.14), transparent 58%),
          radial-gradient(820px 520px at 92% 12%, rgba(1, 147, 145, 0.16), transparent 52%),
          var(--surface);
      }
      .page {
        width: 100%;
        max-width: 440px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
      }
      h1 {
        font-size: 1.35rem;
        letter-spacing: -0.02em;
        margin: 0 0 12px;
        color: var(--text);
        text-align: center;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 20px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .btn:hover {
        border-color: var(--primary-mid);
      }
      .btn-primary {
        background: linear-gradient(135deg, rgba(0, 96, 108, 0.15) 0%, rgba(0, 223, 195, 0.22) 100%);
        border-color: rgba(0, 96, 108, 0.35);
        color: var(--primary);
      }
      .login-theme-row {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="login-theme-row">
        <button type="button" class="btn-theme-toggle" id="btnThemeToggle" title="Modo oscuro" aria-label="Modo oscuro" aria-pressed="false">
          <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
          <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5" /></svg>
        </button>
      </div>
      <div class="panel">
        <h1>Cuenta no disponible</h1>
        <p>
          Tu acceso a la plataforma está desactivado. Si crees que es un error, contacta al administrador.
        </p>
        <div class="actions">
          <button type="button" class="btn btn-primary" id="btnCerrar">Cerrar sesión</button>
        </div>
      </div>
    </div>
    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var url = window.SUPABASE_URL;
        var key = window.SUPABASE_ANON_KEY;
        if (!url || !key || String(url).indexOf("TU_PROYECTO") !== -1) {
          window.location.replace("login.html");
          return;
        }
        var sb = window.supabase.createClient(url, key);

        sb.auth.getSession().then(function (r) {
          if (!r || !r.data || !r.data.session) {
            window.location.replace("login.html");
            return;
          }
          var uid = r.data.session.user.id;
          sb.from("platform_owners")
            .select("user_id")
            .eq("user_id", uid)
            .maybeSingle()
            .then(function (ownRes) {
              if (ownRes.error) {
                window.location.replace("dashboard.html");
                return;
              }
              if (ownRes.data && ownRes.data.user_id) {
                window.location.replace("dashboard.html");
                return;
              }
              sb.from("asesor_cuentas")
                .select("account_enabled")
                .eq("user_id", uid)
                .maybeSingle()
                .then(function (acctRes) {
                  if (acctRes.error) {
                    window.location.replace("dashboard.html");
                    return;
                  }
                  var row = acctRes.data;
                  if (!row || row.account_enabled !== false) {
                    window.location.replace("dashboard.html");
                  }
                });
            });
        });

        document.getElementById("btnCerrar").addEventListener("click", function () {
          sb.auth.signOut().then(function () {
            window.location.href = "login.html";
          });
        });
      })();
    </script>
  </body>
</html>
