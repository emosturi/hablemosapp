<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ver cliente potencial</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --accent: #8b5cf6;
        --shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        --radius: 16px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 20% 0%, rgba(139, 92, 246, 0.25), transparent 60%),
          radial-gradient(900px 600px at 90% 20%, rgba(34, 197, 94, 0.18), transparent 55%), var(--bg);
        min-height: 100vh;
      }
      .page { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; overflow-x: hidden; }
      header { margin: 10px 0 18px; }
      h1 { font-size: clamp(22px, 2.6vw, 28px); letter-spacing: -0.02em; margin: 0; }
      .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
      a.back, a.btn {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
      }
      a.back:hover, a.btn:hover { color: var(--text); }
      .header-actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px; }
      .btn {
        padding: 8px 14px;
        border-radius: 10px;
        background: var(--accent);
        color: #fff !important;
        border: none;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:hover { opacity: 0.95; }
      .panel {
        background: linear-gradient(180deg, var(--panel), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        padding: 18px;
      }
      .section {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.12);
        padding: 14px;
        margin: 14px 0;
      }
      .section h2 { font-size: 15px; margin: 0 0 12px; letter-spacing: 0.02em; color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px 20px; }
      .item label { display: block; font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
      .item span { font-size: 14px; }
      .badge-potencial { display: inline-block; padding: 4px 10px; border-radius: 8px; background: rgba(139, 92, 246, 0.25); color: #c4b5fd; font-size: 12px; margin-left: 8px; }
      .loading, .error-msg { padding: 24px; color: var(--muted); }
      .error-msg { color: #ef4444; }
      .nav-bar { display: flex; padding: 12px 16px; background: rgba(0,0,0,0.25); border-bottom: 1px solid var(--border); max-width: 1100px; margin: 0 auto; position: relative; }
      .menu-trigger { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; outline: none; }
      .menu-trigger:hover { background: rgba(255,255,255,0.12); }
      .menu-trigger svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .menu-dropdown { display: none; position: absolute; top: 100%; left: 16px; margin-top: 4px; min-width: 200px; background: #0f1729; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); padding: 6px; z-index: 100; }
      .menu-dropdown.open { display: block; }
      .menu-dropdown a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; color: var(--muted); text-decoration: none; font-size: 14px; border-radius: 8px; transition: background 0.15s, color 0.15s; }
      .menu-dropdown a:hover { background: rgba(255,255,255,0.08); color: var(--text); }
      .menu-dropdown a.active { color: var(--accent); }
      .menu-dropdown a .tab-icon { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .menu-dropdown .menu-divider { height: 1px; background: var(--border); margin: 6px 0; }
      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
      .modal-overlay.open { display: flex; }
      .modal { background: #0f1729; border: 1px solid var(--border); border-radius: var(--radius); max-width: 420px; width: 100%; padding: 24px; box-shadow: var(--shadow); }
      .modal h3 { margin: 0 0 16px; font-size: 18px; }
      .modal label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
      .modal input, .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: rgba(0,0,0,0.2); color: var(--text); font-size: 14px; margin-bottom: 14px; font-family: inherit; }
      .modal textarea { min-height: 80px; resize: vertical; }
      .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
      .modal-actions button { flex: 1; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
      .modal-actions .btn-primary { background: var(--accent); color: #fff; }
      .modal-actions .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }
      .modal-actions button:disabled { opacity: 0.6; cursor: not-allowed; }
      .modal-feedback { margin-top: 12px; font-size: 13px; }
      .modal-feedback.error { color: #ef4444; }
      .modal-feedback.success { color: #22c55e; }
      @media (max-width: 640px) {
        .page { padding: 20px 12px 40px; }
        .grid { grid-template-columns: 1fr; }
        .header-actions { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <nav class="nav-bar" role="navigation">
      <div class="menu-wrap">
        <button type="button" class="menu-trigger" id="menuTrigger" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          Menú
        </button>
        <div class="menu-dropdown" id="menuDropdown">
          <a href="index.html">Formulario Pensión</a>
          <a href="clientes.html">Registro de Afiliados</a>
          <a href="revisar-clientes.html" class="active">Listado de Clientes</a>
          <a href="clientes-potenciales.html">Clientes Potenciales</a>
          <a href="enlace-registro-publico.html">Enlace registro público</a>
          <a href="recordatorios.html">Recordatorios</a>
          <div class="menu-divider"></div>
          <a href="#" id="btnCerrarSesion" title="Cerrar sesión"><svg class="tab-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="10" height="16" rx="1"/><path d="M10 12h10M17 9l3 3-3 3"/></svg> Cerrar sesión</a>
        </div>
      </div>
    </nav>
    <script>
      (function() {
        var trigger = document.getElementById("menuTrigger");
        var dropdown = document.getElementById("menuDropdown");
        if (trigger && dropdown) {
          trigger.addEventListener("click", function(e) { e.stopPropagation(); dropdown.classList.toggle("open"); trigger.setAttribute("aria-expanded", dropdown.classList.contains("open")); });
          document.addEventListener("click", function() { dropdown.classList.remove("open"); trigger.setAttribute("aria-expanded", "false"); });
        }
        var btn = document.getElementById("btnCerrarSesion");
        if (btn) {
          var url = window.SUPABASE_URL, key = window.SUPABASE_ANON_KEY;
          if (url && key && url.indexOf("TU_PROYECTO") === -1) {
            btn.addEventListener("click", function(e) { e.preventDefault(); window.supabase.createClient(url, key).auth.signOut().then(function() { window.location.href = "login.html"; }); });
          }
        }
      })();
    </script>
    <div class="page">
      <a href="revisar-clientes.html" class="back">← Volver al listado</a>
      <header>
        <h1 id="titulo">Cliente potencial</h1>
        <p class="subtitle" id="subtitulo">Cargando…</p>
        <div class="header-actions">
          <button type="button" id="btnRecordatorio" class="btn">Agregar Recordatorio</button>
        </div>
      </header>

      <div id="loading" class="loading">Cargando datos…</div>
      <div id="error" class="error-msg" style="display:none;"></div>
      <div id="contenido" class="panel" style="display:none;"></div>
    </div>

    <div class="modal-overlay" id="modalRecordatorio" role="dialog" aria-labelledby="modalRecordatorioTitulo">
      <div class="modal">
        <h3 id="modalRecordatorioTitulo">Agregar recordatorio</h3>
        <form id="formRecordatorio">
          <label for="recordatorioFecha">Fecha del recordatorio</label>
          <input type="date" id="recordatorioFecha" name="fecha" required />
          <label for="recordatorioHora">Hora del recordatorio</label>
          <input type="time" id="recordatorioHora" name="hora" step="60" required />
          <label for="recordatorioMensaje">Mensaje</label>
          <textarea id="recordatorioMensaje" name="mensaje" placeholder="Escribe el mensaje del recordatorio..." required></textarea>
          <div class="modal-actions">
            <button type="button" id="btnCerrarModal" class="btn-secondary">Cancelar</button>
            <button type="submit" id="btnEnviarRecordatorio" class="btn-primary">Programar recordatorio</button>
          </div>
          <div class="modal-feedback" id="modalFeedback" style="display:none;"></div>
        </form>
      </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = params.get("id");
        if (!id) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
          document.getElementById("error").textContent = "Falta el ID. Vuelve al listado.";
          return;
        }

        var url = window.SUPABASE_URL;
        var key = window.SUPABASE_ANON_KEY;
        if (!url || !key || url.indexOf("TU_PROYECTO") !== -1) {
          window.location.replace("login.html");
          return;
        }
        var supabase = window.supabase.createClient(url, key);

        supabase.auth.getSession().then(function (r) {
          if (!r.data.session) {
            window.location.replace("login.html");
            return;
          }

          supabase.from("clientes_potenciales").select("*").eq("id", id).single().then(function (result) {
            document.getElementById("loading").style.display = "none";
            if (result.error || !result.data) {
              document.getElementById("error").style.display = "block";
              document.getElementById("error").textContent = result.error ? result.error.message : "Cliente potencial no encontrado.";
              return;
            }

            var p = result.data;
            var nombre = (p.nombre || "").trim();
            var fechaReg = p.created_at ? new Date(p.created_at).toLocaleDateString("es-CL") : "";

            document.getElementById("titulo").innerHTML = (nombre || "Cliente potencial") + '<span class="badge-potencial">Potencial</span>';
            document.getElementById("subtitulo").textContent = "Registrado el " + (fechaReg || "-");

            function item(label, val) {
              var empty = !val || String(val).trim() === "";
              return '<div class="item' + (empty ? " empty" : "") + '"><label>' + label + '</label><span>' + (val || "-") + '</span></div>';
            }
            var html = '<div class="section"><h2>Datos</h2><div class="grid">';
            html += item("Nombre", p.nombre) + item("Teléfono", p.telefono) + item("Ciudad", p.ciudad) + item("Fecha de registro", fechaReg);
            html += "</div></div>";
            document.getElementById("contenido").innerHTML = html;
            document.getElementById("contenido").style.display = "block";

            var clienteNombre = nombre;
            var clienteTelefono = (p.telefono || "").toString().trim();
            var modal = document.getElementById("modalRecordatorio");
            var btnRecordatorio = document.getElementById("btnRecordatorio");
            var btnCerrarModal = document.getElementById("btnCerrarModal");
            var formRecordatorio = document.getElementById("formRecordatorio");
            var modalFeedback = document.getElementById("modalFeedback");
            var btnEnviar = document.getElementById("btnEnviarRecordatorio");

            function cerrarModal() {
              if (modal) modal.classList.remove("open");
            }
            function mostrarFeedback(msg, esError) {
              if (modalFeedback) {
                modalFeedback.textContent = msg;
                modalFeedback.className = "modal-feedback " + (esError ? "error" : "success");
                modalFeedback.style.display = "block";
              }
            }

            if (btnRecordatorio) {
              btnRecordatorio.addEventListener("click", function () {
                if (modal) modal.classList.add("open");
                if (formRecordatorio) formRecordatorio.reset();
                if (modalFeedback) { modalFeedback.style.display = "none"; modalFeedback.textContent = ""; }
              });
            }
            if (btnCerrarModal) btnCerrarModal.addEventListener("click", cerrarModal);
            modal && modal.addEventListener("click", function (e) {
              if (e.target === modal) cerrarModal();
            });

            if (formRecordatorio) {
              formRecordatorio.addEventListener("submit", function (e) {
                e.preventDefault();
                var fnUrl = window.REMINDER_FUNCTION_URL;
                var secret = window.NOTIFY_SECRET;
                if (!fnUrl || !secret) {
                  mostrarFeedback("Falta configurar REMINDER_FUNCTION_URL o NOTIFY_SECRET.", true);
                  return;
                }
                var fecha = (document.getElementById("recordatorioFecha").value || "").trim();
                var hora = (document.getElementById("recordatorioHora").value || "").trim();
                var mensaje = (document.getElementById("recordatorioMensaje").value || "").trim();
                if (!mensaje) {
                  mostrarFeedback("Escribe el mensaje del recordatorio.", true);
                  return;
                }

                btnEnviar.disabled = true;
                mostrarFeedback("Enviando…", false);

                fetch(fnUrl, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    secret: secret,
                    fecha: fecha,
                    hora: hora,
                    mensaje: mensaje,
                    cliente_id: null,
                    cliente_nombre: clienteNombre,
                    cliente_telefono: clienteTelefono,
                  }),
                })
                  .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
                  .then(function (r) {
                    if (r.ok) {
                      mostrarFeedback("Recordatorio programado. Recibirás el mensaje por Telegram el día indicado.", false);
                      setTimeout(cerrarModal, 1500);
                    } else {
                      mostrarFeedback(r.data && r.data.error ? r.data.error : "Error al enviar.", true);
                    }
                  })
                  .catch(function () { mostrarFeedback("Error de red al enviar.", true); })
                  .finally(function () { btnEnviar.disabled = false; });
              });
            }
          });
        });
      })();
    </script>
  </body>
</html>
