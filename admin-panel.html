<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel Owner - HablemosApp</title>
    <link rel="stylesheet" href="app-shell.css" />
    <script src="theme-init.js"></script>
    <style>
      .page { max-width: 1150px; margin: 0 auto; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
      h1 { margin: 0 0 8px; }
      .sub { margin: 0 0 16px; color: var(--muted); }
      .msg { margin: 10px 0 0; color: var(--muted); font-size: 13px; }
      .tools { display: flex; gap: 10px; align-items: center; margin: 8px 0 4px; flex-wrap: wrap; }
      .tools input[type="search"] { min-width: 260px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid var(--border); text-align: left; padding: 10px 8px; vertical-align: top; }
      th { color: var(--muted); font-weight: 600; }
      .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
      select, input[type="datetime-local"] { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 12px; }
      .btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 12px; }
      .btn:hover { border-color: var(--primary-mid); }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" aria-label="Navegación">
        <div class="logo-row"><div class="logo-dot"></div><span class="logo-text">HablemosApp</span></div>
        <div class="nav-label">Menú</div>
        <a href="dashboard.html">Dashboard</a>
        <a href="admin-panel.html" class="active">Panel owner</a>
      </aside>
      <div class="main">
        <header class="topbar">
          <div class="search-wrap"></div>
          <button type="button" class="btn-theme-toggle" id="btnThemeToggle" title="Modo oscuro" aria-label="Modo oscuro" aria-pressed="false">
            <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
            <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5" /></svg>
          </button>
        </header>
        <div class="content">
          <div class="page">
            <h1>Panel owner</h1>
            <p class="sub">Administra cuentas de asesores y suscripciones desde una sola vista.</p>
            <div class="panel">
              <div class="tools">
                <input type="search" id="advisorSearch" placeholder="Buscar por email o teléfono…" autocomplete="off" />
              </div>
              <div id="msg" class="msg">Cargando usuarios…</div>
              <div style="overflow:auto; margin-top:10px;">
                <table>
                  <thead>
                    <tr>
                      <th>Email</th>
                      <th>Teléfono</th>
                      <th>Cuenta</th>
                      <th>Telegram rec.</th>
                      <th>Plan</th>
                      <th>Estado</th>
                      <th>Periodo fin</th>
                      <th>Acción</th>
                    </tr>
                  </thead>
                  <tbody id="rows"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="supabase-config.js"></script>
    <script src="app-shell.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var msg = document.getElementById("msg");
        var rows = document.getElementById("rows");
        var advisorSearch = document.getElementById("advisorSearch");
        var sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        var allAdvisors = [];

        function esc(s) { return String(s || "").replace(/[&<>"']/g, function (m) { return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" })[m]; }); }
        function toLocalInput(v) {
          if (!v) return "";
          var d = new Date(v);
          if (isNaN(d.getTime())) return "";
          var y = d.getFullYear();
          var m = String(d.getMonth() + 1).padStart(2, "0");
          var day = String(d.getDate()).padStart(2, "0");
          var h = String(d.getHours()).padStart(2, "0");
          var mi = String(d.getMinutes()).padStart(2, "0");
          return y + "-" + m + "-" + day + "T" + h + ":" + mi;
        }

        function rowHtml(u) {
          return "<tr data-id='" + esc(u.user_id) + "'>" +
            "<td>" + esc(u.email) + "</td>" +
            "<td>" + esc(u.telefono || "—") + "</td>" +
            "<td><select class='f-enabled'><option value='true'" + (u.account_enabled ? " selected":"") + ">Activa</option><option value='false'" + (!u.account_enabled ? " selected":"") + ">Bloqueada</option></select></td>" +
            "<td><select class='f-tg'><option value='true'" + (u.telegram_reminders_enabled !== false ? " selected":"") + ">Sí</option><option value='false'" + (u.telegram_reminders_enabled === false ? " selected":"") + ">No</option></select></td>" +
            "<td><select class='f-plan'><option value=''>—</option><option value='mensual'" + (u.subscription_plan === "mensual" ? " selected":"") + ">Mensual</option><option value='anual'" + (u.subscription_plan === "anual" ? " selected":"") + ">Anual</option></select></td>" +
            "<td><select class='f-status'><option value='none'" + (u.subscription_status === "none" ? " selected":"") + ">Sin suscripción</option><option value='trial'" + (u.subscription_status === "trial" ? " selected":"") + ">Trial</option><option value='active'" + (u.subscription_status === "active" ? " selected":"") + ">Activa</option><option value='past_due'" + (u.subscription_status === "past_due" ? " selected":"") + ">Mora</option><option value='canceled'" + (u.subscription_status === "canceled" ? " selected":"") + ">Cancelada</option></select></td>" +
            "<td><input type='datetime-local' class='f-end' value='" + esc(toLocalInput(u.current_period_end)) + "' /></td>" +
            "<td><div class='row-actions'><button type='button' class='btn btn-save'>Guardar</button></div></td>" +
          "</tr>";
        }

        function renderRows(list) {
          rows.innerHTML = list.map(rowHtml).join("");
          msg.textContent = "Usuarios cargados: " + list.length + (advisorSearch && advisorSearch.value.trim() ? " (filtrados)" : "");
        }

        function applyFilter() {
          var q = advisorSearch ? String(advisorSearch.value || "").trim().toLowerCase() : "";
          if (!q) {
            renderRows(allAdvisors);
            return;
          }
          var filtered = allAdvisors.filter(function (u) {
            return String(u.email || "").toLowerCase().indexOf(q) !== -1 || String(u.telefono || "").toLowerCase().indexOf(q) !== -1;
          });
          renderRows(filtered);
        }

        function callOwnerApi(path, method, body) {
          return sb.auth.getSession().then(function (r) {
            var token = r && r.data && r.data.session && r.data.session.access_token;
            if (!token) throw new Error("Sesión inválida");
            return fetch(path, {
              method: method || "GET",
              headers: Object.assign(
                { Authorization: "Bearer " + token },
                body ? { "Content-Type": "application/json" } : {}
              ),
              body: body ? JSON.stringify(body) : undefined,
            }).then(function (res) {
              return res.json().then(function (json) { return { ok: res.ok, json: json }; });
            });
          });
        }

        function load() {
          callOwnerApi("/.netlify/functions/admin-list-advisors", "GET")
            .then(function (r) {
              if (!r.ok) throw new Error((r.json && r.json.error) || "No se pudo cargar");
              var list = (r.json && r.json.advisors) || [];
              allAdvisors = list;
              applyFilter();
            })
            .catch(function (e) {
              msg.textContent = e.message || "Error cargando usuarios.";
            });
        }

        rows.addEventListener("click", function (ev) {
          var btn = ev.target && ev.target.closest(".btn-save");
          if (!btn) return;
          var tr = btn.closest("tr");
          var payload = {
            user_id: tr.getAttribute("data-id"),
            account_enabled: tr.querySelector(".f-enabled").value === "true",
            telegram_reminders_enabled: tr.querySelector(".f-tg").value === "true",
            subscription_plan: tr.querySelector(".f-plan").value || null,
            subscription_status: tr.querySelector(".f-status").value || null,
            current_period_end: tr.querySelector(".f-end").value ? new Date(tr.querySelector(".f-end").value).toISOString() : null,
          };
          btn.disabled = true;
          callOwnerApi("/.netlify/functions/admin-upsert-advisor-account", "POST", payload)
            .then(function (r) {
              btn.disabled = false;
              if (!r.ok) throw new Error((r.json && r.json.error) || "No se pudo guardar");
              msg.textContent = "Cuenta actualizada para " + payload.user_id;
            })
            .catch(function (e) {
              btn.disabled = false;
              msg.textContent = e.message || "Error al guardar.";
            });
        });

        if (advisorSearch) {
          advisorSearch.addEventListener("input", applyFilter);
        }

        sb.auth.getSession().then(function (r) {
          if (!r || !r.data || !r.data.session) {
            window.location.replace("login.html");
            return;
          }
          load();
        });
      })();
    </script>
  </body>
</html>
